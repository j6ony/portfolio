services:
  - type: web
    name: portfolio-backend
    env: python
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate
    startCommand: gunicorn config.wsgi --bind 0.0.0.0:$PORT --log-file -
    envVars:
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: PRODUCTION_FRONTEND_URL
        value: "https://portfolio.netlify.app"
      - key: DATABASE_URL
        value: "postgresql://..."
      - key: PYTHON_VERSION
        value: "3.12.0"
