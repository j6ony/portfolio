<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 240" fill="none">
  <defs>
    <linearGradient id="primary" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6c5ce7"/>
      <stop offset="100%" stop-color="#a29bfe"/>
    </linearGradient>
    <linearGradient id="primaryDim" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6c5ce7" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#a29bfe" stop-opacity="0.15"/>
    </linearGradient>
    <linearGradient id="markLight" x1="0.3" y1="0" x2="0.7" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Logo Mark -->
  <g transform="translate(28, 20)">
    <!-- Outer glow -->
    <rect x="16" y="16" width="168" height="168" rx="40" fill="var(--bg-secondary, #111)" />
    <rect x="18" y="18" width="164" height="164" rx="38" stroke="url(#primaryDim)" stroke-width="6" />

    <!-- Main mark container -->
    <rect x="24" y="24" width="152" height="152" rx="32" fill="var(--bg-card, #1a1a1a)" stroke="url(#primary)" stroke-width="1.5" />

    <!-- Subtle surface highlight -->
    <rect x="24" y="24" width="152" height="76" rx="32" fill="url(#markLight)" />

    <!-- D mark -->
    <g transform="translate(76, 40)">
      <!-- Left vertical bar -->
      <rect x="-28" y="0" width="16" height="80" rx="4" fill="url(#primary)" />
      <!-- Top horizontal bar -->
      <rect x="-12" y="0" width="40" height="16" rx="4" fill="url(#primary)" />
      <!-- Curved arc (the D curve) -->
      <path d="M28 16 C52 16 52 64 28 64" stroke="url(#primary)" stroke-width="14" stroke-linecap="round" fill="none"/>
      <!-- Inner accent dot -->
      <circle cx="20" cy="40" r="4" fill="var(--bg-primary, #0a0a0a)" />
    </g>

    <!-- Bottom right accent -->
    <rect x="132" y="132" width="32" height="32" rx="6" fill="url(#primary)" opacity="0.15" />
    <rect x="136" y="136" width="24" height="24" rx="4" fill="url(#primary)" opacity="0.1" />
  </g>

  <!-- Wordmark -->
  <g transform="translate(230, 20)">
    <!-- 王德芳 -->
    <text x="0" y="72" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="54" font-weight="300" fill="var(--text-primary, #f0f0f0)" letter-spacing="8">王德芳</text>

    <!-- Separator line -->
    <rect x="0" y="98" width="40" height="1.5" rx="0.75" fill="url(#primary)" />

    <!-- Titles -->
    <text x="0" y="130" font-family="'Inter', -apple-system, sans-serif" font-size="14" font-weight="300" fill="var(--text-secondary, #a0a0a0)" letter-spacing="6">视觉设计师</text>
    <text x="0" y="154" font-family="'Inter', -apple-system, sans-serif" font-size="14" font-weight="300" fill="var(--text-secondary, #a0a0a0)" letter-spacing="6">AI 设计师</text>
  </g>
</svg>
